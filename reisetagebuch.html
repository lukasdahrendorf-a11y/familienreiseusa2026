<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Reisetagebuch - Familie Dahrendorf</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

@page { size: A4 landscape; margin: 0; }

body { font-family: 'Nunito', sans-serif; color: #264653; background: white; }

.page {
  width: 297mm; height: 210mm;
  padding: 12mm;
  page-break-after: always;
  position: relative;
  overflow: hidden;
}

/* === COVER === */
.cover {
  background: linear-gradient(135deg, #264653 0%, #2A9D8F 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: white;
}
.cover h1 { font-family: 'Fraunces', serif; font-size: 42pt; margin-bottom: 8mm; }
.cover h2 { font-family: 'Fraunces', serif; font-size: 24pt; font-weight: 400; color: #E9C46A; margin-bottom: 15mm; }
.cover .child-name { font-family: 'Fraunces', serif; font-size: 56pt; font-weight: 900; color: #E9C46A; margin: 10mm 0; }
.cover .subtitle { font-size: 14pt; color: rgba(255,255,255,0.8); margin-bottom: 5mm; }
.cover .dates { font-size: 16pt; font-weight: 700; color: white; background: rgba(255,255,255,0.15); padding: 4mm 8mm; border-radius: 20px; display: inline-block; }
.cover .plane { font-size: 60pt; margin-bottom: 10mm; }
.cover .deco { position: absolute; font-size: 80pt; opacity: 0.1; }
.cover .deco-tl { top: 10mm; left: 15mm; }
.cover .deco-br { bottom: 10mm; right: 15mm; }

/* === ROUTE PAGE === */
.route-page { padding: 10mm; }
.route-page h2 { font-family: 'Fraunces', serif; font-size: 22pt; text-align: center; margin-bottom: 6mm; color: #264653; }
.route-page .route-subtitle { text-align: center; font-size: 11pt; color: #8D99AE; margin-bottom: 8mm; }
.route-list { display: grid; grid-template-columns: 1fr 1fr; gap: 3mm 8mm; }
.route-item { display: flex; align-items: center; gap: 3mm; padding: 2.5mm 4mm; border-radius: 8px; background: #f5f5f2; }
.route-dot { width: 8mm; height: 8mm; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 7pt; font-weight: 800; flex-shrink: 0; }
.route-item .info { flex: 1; }
.route-item .place { font-weight: 700; font-size: 10pt; }
.route-item .dates { font-size: 8pt; color: #8D99AE; }
.route-item .checkbox { width: 6mm; height: 6mm; border: 2px solid #2A9D8F; border-radius: 3px; flex-shrink: 0; }
.route-legend { text-align: center; margin-top: 6mm; font-size: 9pt; color: #8D99AE; }

/* === DAY SPREAD (double page) === */
.day-spread {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  height: 100%; padding: 8mm;
}
.day-left, .day-right { padding: 4mm; }

/* Left page */
.day-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4mm; }
.day-number { font-family: 'Fraunces', serif; font-size: 36pt; font-weight: 900; line-height: 1; }
.day-meta { text-align: right; }
.day-date { font-weight: 700; font-size: 12pt; }
.day-location { font-family: 'Fraunces', serif; font-size: 16pt; font-weight: 700; color: #2A9D8F; }

.fun-fact { background: #E9C46A20; border-left: 3px solid #E9C46A; padding: 3mm 4mm; border-radius: 0 8px 8px 0; margin: 4mm 0; font-size: 9pt; }
.fun-fact strong { color: #E9C46A; }

.section-title { font-weight: 800; font-size: 9pt; text-transform: uppercase; letter-spacing: 0.5px; margin: 4mm 0 2mm 0; }

.weather-row { display: flex; gap: 3mm; flex-wrap: wrap; margin-bottom: 3mm; }
.weather-option { display: flex; align-items: center; gap: 1.5mm; font-size: 9pt; }
.weather-circle { width: 5mm; height: 5mm; border: 1.5px solid #8D99AE; border-radius: 50%; }

.smiley-row { display: flex; gap: 4mm; margin: 3mm 0; }
.smiley-item { text-align: center; font-size: 8pt; }
.smiley-item .emoji { font-size: 18pt; display: block; margin-bottom: 1mm; }
.smiley-circle { width: 6mm; height: 6mm; border: 1.5px solid #8D99AE; border-radius: 50%; margin: 0 auto; }

.food-section { margin: 3mm 0; }
.food-line { border-bottom: 1px dashed #c0c0c0; height: 7mm; font-size: 9pt; color: #8D99AE; padding-top: 1.5mm; }

/* Right page */
.photo-box { width: 100%; height: 50mm; border: 2px dashed #c0c0c0; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #8D99AE; font-size: 10pt; margin-bottom: 4mm; background: #fafafa; }

.diary-lines { margin-top: 2mm; }
.diary-line { border-bottom: 1px solid #e0e0e0; height: 8mm; }
.diary-prompt { font-size: 9pt; color: #8D99AE; font-style: italic; padding-top: 1mm; }

.joke-box { background: #E76F5115; border-radius: 8px; padding: 3mm 4mm; margin-top: 3mm; }
.joke-box .joke-title { font-weight: 800; font-size: 8pt; color: #E76F51; text-transform: uppercase; }
.joke-box .joke-text { font-size: 9pt; margin-top: 1mm; }
.joke-box .joke-answer { font-size: 8pt; color: #8D99AE; margin-top: 1mm; }

.puzzle-box { background: #2A9D8F10; border-radius: 8px; padding: 3mm 4mm; margin-top: 3mm; }
.puzzle-box .puzzle-title { font-weight: 800; font-size: 8pt; color: #2A9D8F; text-transform: uppercase; }
.puzzle-box .puzzle-text { font-size: 9pt; margin-top: 1mm; }

.divider { width: 1px; background: #e0e0e0; margin: 0 2mm; }

/* === LAST PAGE === */
.last-page { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.last-page h2 { font-family: 'Fraunces', serif; font-size: 28pt; color: #264653; margin-bottom: 8mm; }
.last-page .fav-section { width: 80%; margin: 3mm 0; }
.last-page .fav-line { border-bottom: 1px dashed #c0c0c0; height: 9mm; text-align: left; }
.last-page .fav-label { font-size: 10pt; color: #8D99AE; padding-top: 2mm; }
.last-page .big-draw { width: 80%; height: 70mm; border: 2px dashed #c0c0c0; border-radius: 12px; margin-top: 5mm; display: flex; align-items: center; justify-content: center; color: #8D99AE; font-size: 11pt; }

@media print {
  .page { page-break-after: always; }
  .no-print { display: none; }
}
</style>
</head>
