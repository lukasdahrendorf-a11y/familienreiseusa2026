<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Reisetagebuch - Familie Dahrendorf</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
@page { size: A4 landscape; margin: 0; }
body { font-family: 'Nunito', sans-serif; color: #264653; background: white; }

.page {
  width: 297mm; height: 210mm;
  padding: 10mm 12mm;
  page-break-after: always;
  position: relative;
  overflow: hidden;
}
.page-deco-tl, .page-deco-br { position: absolute; opacity: 0.06; font-size: 90pt; pointer-events: none; }
.page-deco-tl { top: -5mm; left: -5mm; }
.page-deco-br { bottom: -5mm; right: -5mm; }
.page-stripe { position: absolute; top: 0; left: 0; width: 6mm; height: 100%; }

/* COVER */
.cover {
  background: linear-gradient(135deg, #264653 0%, #2A9D8F 50%, #264653 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: white; position: relative;
}
.cover h1 { font-family: 'Fraunces', serif; font-size: 44pt; margin-bottom: 4mm; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.cover h2 { font-family: 'Fraunces', serif; font-size: 22pt; font-weight: 400; color: #E9C46A; margin-bottom: 8mm; }
.cover .child-name { font-family: 'Fraunces', serif; font-size: 58pt; font-weight: 900; color: #E9C46A; margin: 6mm 0; text-shadow: 0 3px 12px rgba(0,0,0,0.2); }
.cover .subtitle { font-size: 14pt; color: rgba(255,255,255,0.8); margin-bottom: 3mm; }
.cover .dates { font-size: 16pt; font-weight: 700; background: rgba(255,255,255,0.15); padding: 3mm 8mm; border-radius: 20px; display: inline-block; }
.cover .deco { position: absolute; font-size: 80pt; opacity: 0.08; }

/* ROUTE PAGE */
.route-page { padding: 10mm; }
.route-page h2 { font-family: 'Fraunces', serif; font-size: 22pt; text-align: center; margin-bottom: 4mm; color: #264653; }
.route-page .route-subtitle { text-align: center; font-size: 11pt; color: #8D99AE; margin-bottom: 5mm; }
.route-list { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5mm 8mm; }
.route-item { display: flex; align-items: center; gap: 3mm; padding: 2mm 4mm; border-radius: 8px; background: #f5f5f2; }
.route-dot { width: 8mm; height: 8mm; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 7pt; font-weight: 800; flex-shrink: 0; }
.route-item .info { flex: 1; }
.route-item .place { font-weight: 700; font-size: 10pt; }
.route-item .dates { font-size: 8pt; color: #8D99AE; }
.route-item .checkbox { width: 6mm; height: 6mm; border: 2px solid #2A9D8F; border-radius: 3px; flex-shrink: 0; }

/* DAY PAGES */
.day-left-page, .day-right-page { padding: 10mm 12mm; position: relative; }
.day-header { display: flex; align-items: flex-start; gap: 4mm; margin-bottom: 3mm; }
.day-badge { width: 22mm; height: 22mm; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.day-badge .badge-num { font-family: 'Fraunces', serif; font-size: 22pt; font-weight: 900; line-height: 1; }
.day-badge .badge-label { font-size: 7pt; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.day-info { flex: 1; }
.day-date { font-weight: 700; font-size: 12pt; color: #8D99AE; }
.day-location { font-family: 'Fraunces', serif; font-size: 18pt; font-weight: 700; line-height: 1.2; }
.day-icon { flex-shrink: 0; }

.program-box { background: linear-gradient(135deg, #264653 0%, #2A9D8F 100%); border-radius: 10px; padding: 3.5mm 5mm; margin-bottom: 3mm; color: white; position: relative; overflow: hidden; }
.program-box::after { content: ''; position: absolute; top: -10mm; right: -10mm; width: 30mm; height: 30mm; background: rgba(255,255,255,0.05); border-radius: 50%; }
.program-title { font-weight: 800; font-size: 9pt; text-transform: uppercase; letter-spacing: 0.5px; color: #E9C46A; margin-bottom: 1.5mm; }
.program-text { font-size: 9pt; line-height: 1.4; }
.program-drive { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 6px; padding: 1mm 3mm; margin-top: 1.5mm; font-size: 8.5pt; font-weight: 700; }

.fun-fact { background: #E9C46A15; border-left: 4px solid #E9C46A; padding: 2.5mm 4mm; border-radius: 0 8px 8px 0; margin-bottom: 3mm; font-size: 9pt; line-height: 1.4; }
.fun-fact strong { color: #E9C46A; }

.section-title { font-weight: 800; font-size: 8pt; text-transform: uppercase; letter-spacing: 0.5px; margin: 2mm 0 1.5mm 0; color: #264653; }
.weather-row { display: flex; gap: 3.5mm; flex-wrap: wrap; }
.weather-option { display: flex; align-items: center; gap: 1.5mm; font-size: 9pt; }
.weather-circle { width: 5mm; height: 5mm; border: 2px solid #8D99AE; border-radius: 50%; }
.smiley-row { display: flex; gap: 5mm; }
.smiley-item { text-align: center; }
.smiley-item .emoji { font-size: 18pt; display: block; }
.smiley-circle { width: 5mm; height: 5mm; border: 2px solid #8D99AE; border-radius: 50%; margin: 1mm auto 0; }
.coolest-line { border-bottom: 1.5px dashed #d0d0d0; height: 7mm; }

.joke-box { background: #E76F5110; border-radius: 10px; padding: 2.5mm 4mm; margin-top: 2mm; border: 1px solid #E76F5130; }
.joke-box .joke-title { font-weight: 800; font-size: 8pt; color: #E76F51; text-transform: uppercase; }
.joke-box .joke-text { font-size: 9.5pt; margin-top: 1mm; }
.joke-box .joke-answer { font-size: 8pt; color: #8D99AE; margin-top: 1mm; }

/* RIGHT PAGE */
.right-page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3mm; padding-bottom: 2mm; border-bottom: 2px solid #e0e0e0; }
.right-page-tag { font-family: 'Fraunces', serif; font-size: 12pt; font-weight: 700; color: #8D99AE; }

.photo-box { width: 150mm; height: 100mm; border: 2.5px dashed #c0c0c0; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 3mm auto; background: #fafafa; position: relative; }
.photo-box .photo-hint { text-align: center; line-height: 1.5; color: #d0d0d0; font-size: 10pt; }
.photo-box .photo-size { font-size: 7pt; color: #d0d0d0; position: absolute; bottom: 2mm; right: 3mm; }

.coloring-area { display: flex; align-items: center; justify-content: center; margin: 2mm auto; }

.diary-lines { margin-top: 1.5mm; }
.diary-line { border-bottom: 1px solid #e8e8e8; height: 8mm; }
.diary-prompt { font-size: 9pt; color: #8D99AE; font-style: italic; padding-top: 1.5mm; }

/* ACTIVITY PAGES */
.activity-page { padding: 10mm 12mm; position: relative; }
.activity-page h2 { font-family: 'Fraunces', serif; font-size: 24pt; text-align: center; margin-bottom: 4mm; }
.activity-page .activity-subtitle { text-align: center; font-size: 11pt; color: #8D99AE; margin-bottom: 5mm; }
.checklist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4mm; }
.checklist-item { display: flex; align-items: center; gap: 3mm; padding: 2.5mm 4mm; border-radius: 8px; background: #f8f8f5; border: 1px solid #e8e8e0; }
.checklist-item .check { width: 6mm; height: 6mm; border: 2px solid #2A9D8F; border-radius: 3px; flex-shrink: 0; }
.checklist-item .animal-icon { font-size: 18pt; flex-shrink: 0; }
.checklist-item .animal-info { flex: 1; }
.checklist-item .animal-name { font-weight: 700; font-size: 10pt; }
.checklist-item .animal-where { font-size: 7pt; color: #8D99AE; }

.stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4mm; }
.stamp-box { aspect-ratio: 1; border: 2.5px dashed #c0c0c0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; padding: 2mm; text-align: center; }
.stamp-box .stamp-label { font-size: 8pt; font-weight: 700; color: #8D99AE; margin-top: 1mm; }
.stamp-box .stamp-icon { font-size: 20pt; }

/* LAST / SOLUTIONS */
.last-page { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.last-page h2 { font-family: 'Fraunces', serif; font-size: 28pt; color: #264653; margin-bottom: 5mm; }
.last-page .fav-section { width: 80%; margin: 2mm 0; }
.last-page .fav-line { border-bottom: 1px dashed #c0c0c0; height: 9mm; text-align: left; }
.last-page .fav-label { font-size: 10pt; color: #8D99AE; padding-top: 2mm; }
.last-page .big-draw { width: 80%; height: 60mm; border: 2px dashed #c0c0c0; border-radius: 12px; margin-top: 3mm; display: flex; align-items: center; justify-content: center; color: #8D99AE; font-size: 11pt; }

.solutions-page { padding: 10mm; }
.solutions-page h2 { font-family: 'Fraunces', serif; font-size: 22pt; text-align: center; color: #264653; margin-bottom: 4mm; }
.solutions-page .solutions-subtitle { text-align: center; font-size: 11pt; color: #8D99AE; margin-bottom: 4mm; }
.solutions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2mm 6mm; }
.solution-item { padding: 2mm 4mm; border-radius: 8px; background: #E76F5108; border-left: 3px solid #E76F51; }
.solution-item .sol-day { font-weight: 800; font-size: 7pt; color: #E76F51; text-transform: uppercase; }
.solution-item .sol-q { font-size: 7.5pt; font-weight: 700; margin-top: 0.5mm; }
.solution-item .sol-a { font-size: 7.5pt; color: #2A9D8F; font-style: italic; }

@media print {
  .page { page-break-after: always; }
  .no-print { display: none; }
}
</style>
</head>

  <h2>Reisetagebuch drucken</h2>
